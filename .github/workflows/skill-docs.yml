name: Skill docs freshness

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Check SKILL.md freshness
        run: bun run gen:skill-docs:dry

      - name: Validate skills
        run: bun run skill:check

      - name: Run tests
        run: bun test
